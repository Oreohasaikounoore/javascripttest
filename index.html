<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Web Push Test</title>
</head>
<body>

<h3>Web Push テスト</h3>
<button id="btn">登録</button>
<pre id="log"></pre>

<script>
const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbygE8QpCtr5ggub1poNrUuZsopO6_NBohMAKLE_HCozDiY9VkCCIA3nb7IpHJ8aB2jb/exec";
const VAPID_PUBLIC_KEY = "BIvRwwwZHrACyJEJVK1VmZhqWg9o7k5XPVt3_WjPGAuBaRX9IvbKtwNdXVWcHLASJQf1ZKMqxY7gtwvRQ1tm_2Y";

const logEl = document.getElementById("log");
function log(msg){ logEl.textContent += msg + "\n"; }

function base64ToUint8Array(base64){
  const padding = "=".repeat((4 - base64.length % 4) % 4);
  const base64safe = (base64 + padding).replace(/-/g,"+").replace(/_/g,"/");
  const raw = atob(base64safe);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

document.getElementById("btn").onclick = async () => {
  const perm = await Notification.requestPermission();
  if(perm !== "granted") return log("通知拒否");

  const reg = await navigator.serviceWorker.register("./sw.js");
  await navigator.serviceWorker.ready;

  const sub = await reg.pushManager.subscribe({
    userVisibleOnly:true,
    applicationServerKey: base64ToUint8Array(VAPID_PUBLIC_KEY)
  });

  log("登録OK");

  await fetch(GAS_WEBAPP_URL, {
    method:"POST",
    mode:"no-cors",
    body: JSON.stringify(sub)
  });

  log("GAS送信完了");
};
</script>

</body>
</html>
