<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Worker テスト</title>

<style>
body {
    font-family: sans-serif;
    margin: 20px;
}

#status {
    padding: 12px;
    background: #eee;
    border-radius: 8px;
    margin-bottom: 10px;
    white-space: pre-wrap;
}
</style>

</head>
<body>

<h2>Service Worker テスト</h2>

<div id="status">初期化中...</div>

<button id="registerBtn">
    Service Worker 登録
</button>

<script>
const status = document.getElementById("status");

function log(msg) {
    console.log(msg);
    status.textContent += "\n" + msg;
}

status.textContent = "ページ読込完了";

if (!("serviceWorker" in navigator)) {
    status.textContent =
        "このブラウザはService Worker非対応です";
}

document.getElementById("registerBtn")
.addEventListener("click", async () => {

    try {
        log("登録開始");

        const registration =
            await navigator.serviceWorker.register("./javascript.js");

        log("登録成功");
        log("scope: " + registration.scope);

        await navigator.serviceWorker.ready;

        log("SW READY");

    } catch (e) {
        log("エラー");
        log(e.message);
        console.error(e);
    }

});
</script>

</body>
</html>
