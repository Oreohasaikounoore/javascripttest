<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Push 登録</title>

<style>
body {
    font-family: sans-serif;
    margin: 20px;
}

#status {
    padding: 12px;
    background: #eee;
    border-radius: 8px;
    margin-bottom: 10px;
    white-space: pre-wrap;
}
</style>

</head>
<body>

<h2>Web Push 登録</h2>

<div id="status">初期化中...</div>

<button id="registerBtn">
通知を有効化
</button>

<script>

const GAS_WEBAPP_URL =
"https://script.google.com/macros/s/AKfycbxPSy1tZla_glgLIgdIDHjgonr7bblf6lTAJo5VyD2gcRr3tyquGNkFfGaiMvpVGyXQ/exec";

const VAPID_PUBLIC_KEY =
"BIvRwwwZHrACyJEJVK1VmZhqWg9o7k5XPVt3_WjPGAuBaRX9IvbKtwNdXVWcHLASJQf1ZKMqxY7gtwvRQ1tm_2Y";

const statusElement =
document.getElementById("status");

function log(message) {
    console.log(message);
    statusElement.textContent += "\n" + message;
}

function urlBase64ToUint8Array(base64String) {

    const padding =
        "=".repeat(
            (4 - base64String.length % 4) % 4
        );

    const base64 =
        (base64String + padding)
        .replace(/-/g, "+")
        .replace(/_/g, "/");

    const rawData = atob(base64);

    return Uint8Array.from(
        [...rawData].map(
            c => c.charCodeAt(0)
        )
    );
}

statusElement.textContent =
"ページ読込完了";

document
.getElementById("registerBtn")
.addEventListener("click", startSetup);

async function startSetup() {

    try {

        log("通知許可要求");

        const permission =
            await Notification.requestPermission();

        if (permission !== "granted") {
            log("通知が拒否されました");
            return;
        }

        log("Service Worker登録");

        const registration =
            await navigator.serviceWorker.register(
                "./javascript.js"
            );

        await navigator.serviceWorker.ready;

        log("SW READY");

        log("Subscription取得");

        const subscription =
            await registration.pushManager.subscribe({
                userVisibleOnly: true,
                applicationServerKey:
                    urlBase64ToUint8Array(
                        VAPID_PUBLIC_KEY
                    )
            });

        log("Subscription取得成功");

        console.log(
            "Subscription:",
            JSON.stringify(
                subscription,
                null,
                2
            )
        );

        log("GASへ送信");

        await fetch(
            GAS_WEBAPP_URL,
            {
                method: "POST",
                mode: "no-cors",
                headers: {
                    "Content-Type":
                        "text/plain"
                },
                body:
                    JSON.stringify(
                        subscription
                    )
            }
        );

        log("送信完了");
        log("登録完了");

    } catch (error) {

        log("エラー");
        log(error.message);

        console.error(error);

    }
}
</script>

</body>
</html>
