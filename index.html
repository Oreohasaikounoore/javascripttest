<script>
const GAS_WEBAPP_URL =
"https://script.google.com/macros/s/AKfycbxGgCNIJqM5UMses09J8Omp8dOj79O7sP-v1ha3MzQY2qryyYCvWx5wbCXemJ3lXZpv/exec";

const VAPID_PUBLIC_KEY =
"BIvRwwwZHrACyJEJVK1VmZhqWg9o7k5XPVt3_WjPGAuBaRX9IvbKtwNdXVWcHLASJQf1ZKMqxY7gtwvRQ1tm_2Y";

const logEl = document.getElementById("log");

function log(msg, type = "text") {
  const now = new Date();
  const timeStr = `[${now.toTimeString().split(" ")[0]}] `;

  const span = document.createElement("span");
  span.className = `log-${type}`;
  span.textContent = timeStr + msg + "\n";

  logEl.appendChild(span);

  const container = document.getElementById("log-container");
  container.scrollTop = container.scrollHeight;
}

function base64ToUint8Array(base64) {
  const padding = "=".repeat((4 - base64.length % 4) % 4);

  const base64safe = (base64 + padding)
    .replace(/-/g, "+")
    .replace(/_/g, "/");

  const raw = atob(base64safe);

  return Uint8Array.from(
    [...raw].map(c => c.charCodeAt(0))
  );
}

function dumpError(err) {
  log("===== ERROR DETAIL =====", "error");

  try {
    log(`type: ${typeof err}`, "error");

    if (err?.name)
      log(`name: ${err.name}`, "error");

    if (err?.message)
      log(`message: ${err.message}`, "error");

    if ("code" in err)
      log(`code: ${err.code}`, "error");

    if ("cause" in err)
      log(`cause: ${JSON.stringify(err.cause)}`, "error");

    if (err?.stack)
      log(`stack:\n${err.stack}`, "error");

    const props = {};

    Object.getOwnPropertyNames(err).forEach(k => {
      try {
        props[k] = err[k];
      } catch {}
    });

    log(
      "raw error object:\n" +
      JSON.stringify(props, null, 2),
      "error"
    );

  } catch (e) {
    log(
      "error dump failed: " + e.message,
      "error"
    );
  }
}

document.getElementById("btn").onclick = async () => {

  logEl.textContent = "";

  try {

    log("通知登録処理を開始します...", "info");

    log(
      `UserAgent: ${navigator.userAgent}`,
      "info"
    );

    log(
      `isSecureContext: ${window.isSecureContext}`,
      "info"
    );

    log(
      `Notification API: ${!!window.Notification}`,
      "info"
    );

    log(
      `ServiceWorker API: ${!!navigator.serviceWorker}`,
      "info"
    );

    log(
      `PushManager API: ${!!window.PushManager}`,
      "info"
    );

    log(
      "ブラウザに通知権限をリクエスト中...",
      "text"
    );

    const perm =
      await Notification.requestPermission();

    log(
      `通知権限の結果: ${perm}`,
      perm === "granted"
        ? "success"
        : "error"
    );

    if (perm !== "granted") {
      throw new Error(
        "通知権限が許可されていません"
      );
    }

    log("sw.js を登録中...", "text");

    const reg =
      await navigator.serviceWorker.register(
        "./sw.js"
      );

    log(
      "Service Worker が準備完了になるのを待機中...",
      "text"
    );

    await navigator.serviceWorker.ready;

    log(
      "Service Worker がアクティブになりました。",
      "success"
    );

    log(
      `scope: ${reg.scope}`,
      "info"
    );

    log(
      `active: ${!!reg.active}`,
      "info"
    );

    log(
      `installing: ${!!reg.installing}`,
      "info"
    );

    log(
      `waiting: ${!!reg.waiting}`,
      "info"
    );

    log(
      `controller: ${!!navigator.serviceWorker.controller}`,
      "info"
    );

    log(
      "VAPIDキーを変換中...",
      "text"
    );

    const applicationServerKey =
      base64ToUint8Array(
        VAPID_PUBLIC_KEY
      );

    log(
      `VAPID key length: ${applicationServerKey.length}`,
      "info"
    );

    log(
      "既存Subscription確認中...",
      "text"
    );

    const existing =
      await reg.pushManager.getSubscription();

    if (existing) {

      log(
        "既存Subscriptionを検出",
        "info"
      );

      log(
        JSON.stringify(existing, null, 2),
        "info"
      );

    } else {

      log(
        "既存Subscriptionなし",
        "info"
      );
    }

    log(
      "プッシュサーバー(FCM等)に接続してエンドポイントを生成中...",
      "text"
    );

    let sub;

    try {

      sub =
        await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey
        });

    } catch (err) {

      dumpError(err);

      log(
        `Notification.permission=${Notification.permission}`,
        "error"
      );

      log(
        `controller=${!!navigator.serviceWorker.controller}`,
        "error"
      );

      throw err;
    }

    log(
      "🎉 プッシュサーバーへの登録に成功しました！",
      "success"
    );

    log(
      "【取得した購読情報 (Subscription)】\n" +
      JSON.stringify(sub, null, 2),
      "info"
    );

    log(
      "GAS Webアプリケーションへのデータ送信を開始します...",
      "text"
    );

    log(
      `送信先: ${GAS_WEBAPP_URL}`,
      "text"
    );

    await fetch(
      GAS_WEBAPP_URL,
      {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify(sub)
      }
    );

    log(
      "🚀 GASへのデータ送信コマンドが完了しました！",
      "success"
    );

  } catch (err) {

    dumpError(err);

    log(
      `❌ 処理失敗: ${err.message}`,
      "error"
    );

    console.error(err);
  }
};
</script>
