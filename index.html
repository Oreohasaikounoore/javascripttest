<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Push デバッグシステム</title>
<style>
  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    margin: 20px;
    background-color: #f4f7f6;
    color: #333;
  }
  h3 {
    color: #2c3e50;
    border-bottom: 2px solid #bdc3c7;
    padding-bottom: 8px;
  }
  #btn {
    padding: 12px 24px;
    font-size: 16px;
    font-weight: bold;
    background-color: #3498db;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.2s;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }
  #btn:hover {
    background-color: #2980b9;
  }
  #btn:active {
    background-color: #21618c;
  }
  /* コンソール風ログコンテナ */
  #log-container {
    margin-top: 20px;
    background-color: #2d3436;
    color: #dfe6e9;
    padding: 15px;
    border-radius: 6px;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    max-height: 500px;
    overflow-y: auto;
  }
  #log {
    margin: 0;
    font-family: 'Courier New', Courier, monospace;
    font-size: 13px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-all;
  }
  /* ログタイプ別の色分け */
  .log-info { color: #00cec9; }
  .log-success { color: #2ecc71; font-weight: bold; }
  .log-error { color: #ff7675; font-weight: bold; }
  .log-text { color: #ffffff; }
</style>
</head>
<body>

<h3>Web Push 接続・デバッグテスト</h3>
<button id="btn">Web Push 通知を登録する</button>

<div id="log-container">
  <pre id="log"></pre>
</div>

<script>
// 設定値
const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbygE8QpCtr5ggub1poNrUuZsopO6_NBohMAKLE_HCozDiY9VkCCIA3nb7IpHJ8aB2jb/exec";
const VAPID_PUBLIC_KEY = "BIvRwwwZHrACyJEJVK1VmZhqWg9o7k5XPVt3_WjPGAuBaRX9IvbKtwNdXVWcHLASJQf1ZKMqxY7gtwvRQ1tm_2Y";

const logEl = document.getElementById("log");

// 💡 思考: タイムスタンプと色分けを施してログを出力するリッチな関数
function log(msg, type = 'text') {
  const now = new Date();
  const timeStr = `[${now.toTimeString().split(' ')[0]}] `;
  
  // スパン要素を作って色分けクラスを付与
  const span = document.createElement("span");
  span.className = `log-${type}`;
  span.textContent = timeStr + msg + "\n";
  
  logEl.appendChild(span);
  
  // 自動最下部スクロール
  const container = document.getElementById("log-container");
  container.scrollTop = container.scrollHeight;
}

// Base64Url から Uint8Array への変換関数
function base64ToUint8Array(base64) {
  try {
    const padding = "=".repeat((4 - base64.length % 4) % 4);
    const base64safe = (base64 + padding).replace(/-/g, "+").replace(/_/g, "/");
    const raw = atob(base64safe);
    return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
  } catch (err) {
    throw new Error("VAPID公開鍵のBase64デコードに失敗しました。鍵が正しいか確認してください。: " + err.message);
  }
}

document.getElementById("btn").onclick = async () => {
  // ログを一度クリアして開始
  logEl.textContent = "";
  log("通知登録処理を開始します...", "info");

  try {
    // 1. 通知権限の確認
    log("ブラウザに通知権限をリクエスト中...", "text");
    const perm = await Notification.requestPermission();
    log(`通知権限の結果: ${perm}`, perm === "granted" ? "success" : "error");
    
    if (perm !== "granted") {
      log("通知が拒否されたため、処理を中断しました。ブラウザの設定で通知を許可してください。", "error");
      return;
    }

    // 2. Service Workerの登録
    log("sw.js を登録中...", "text");
    const reg = await navigator.serviceWorker.register("./sw.js").catch(err => {
      throw new Error("sw.js の登録に失敗しました。ファイルパスやHTTPS環境を確認してください。詳細: " + err.message);
    });
    
    log("Service Worker が準備完了になるのを待機中...", "text");
    await navigator.serviceWorker.ready;
    log("Service Worker がアクティブになりました。", "success");

    // 3. プッシュサーバーへのサブスクライブ
    log("VAPIDキーを変換中...", "text");
    const applicationServerKey = base64ToUint8Array(VAPID_PUBLIC_KEY);

    log("プッシュサーバー(FCM等)に接続してエンドポイントを生成中...", "text");
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: applicationServerKey
    }).catch(err => {
      throw new Error("プッシュサーバーへの登録(subscribe)に失敗しました。VAPID鍵のペアがズレているか、ブラウザの通信エラーです。詳細: " + err.message);
    });

    log("🎉 プッシュサーバーへの登録に成功しました！", "success");
    
    // 💡 思考: 取得できた購読データの中身を綺麗に整形して画面に出す
    log("【取得した購読情報 (Subscription)】\n" + JSON.stringify(sub, null, 2), "info");

    // 4. GASへデータを送信
    log("GAS Webアプリケーションへのデータ送信を開始します...", "text");
    log(`送信先: ${GAS_WEBAPP_URL}`, "text");

    await fetch(GAS_WEBAPP_URL, {
      method: "POST",
      mode: "no-cors", // GASのリダイレクト対策
      body: JSON.stringify(sub)
    }).then(() => {
      log("🚀 GASへのデータ送信コマンドが完了しました！(mode:no-corsのため成否の成否判定はGAS側依存)", "success");
      log("GAS側の『実行ログ』または『スクリプトプロパティ(SUB)』にデータが書き込まれたか確認してください。", "info");
    }).catch(err => {
      throw new Error("GASへのネットワーク通信自体に失敗しました。URLが正しいか、インターネット接続を確認してください。詳細: " + err.message);
    });

  } catch (error) {
    // 💡 思考: 途中でエラーが起きたら、どのフェーズであってもここに飛んで赤文字で直撃させる
    log(`❌ エラー発生: ${error.message}`, "error");
    console.error(error);
  }
};
</script>

</body>
</html>
